<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="icon" type="image/png" href="logo.png">
<title>11th Syllabus Checklist</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e10;
    --surface: #17171a;
    --border: #2a2a2f;
    --text: #e8e8ec;
    --muted: #666672;
    --done-bg: #1a2a1a;
    --done-text: #4a7a4a;
    --drag-bg: #1e1e24;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; padding: 20px 16px 100px; }

  /* HEADER */
  .header { text-align: center; padding: 28px 0 20px; }
  .header-label { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 4px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
  .header h1 { font-size: 26px; font-weight: 800; line-height: 1.15; }
  .header h1 span { color: #00e5ff; }

  /* PROGRESS */
  .progress-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 18px 20px; margin: 0 auto 24px; max-width: 480px; }
  .progress-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
  .progress-label { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--muted); }
  .progress-count { font-family: 'Space Mono', monospace; font-size: 20px; font-weight: 700; color: #00e5ff; }
  .progress-bar-bg { background: var(--border); border-radius: 99px; height: 7px; overflow: hidden; }
  .progress-bar-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg,#00e5ff,#69ff47); transition: width .5s cubic-bezier(.4,0,.2,1); width: 0%; }

  /* NOW DOING */
  .now-doing { max-width: 480px; margin: 0 auto 20px; background: linear-gradient(135deg,rgba(0,229,255,.1),rgba(105,255,71,.05)); border: 1px solid rgba(0,229,255,.3); border-radius: 14px; padding: 14px 18px; }
  .now-doing-label { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 3px; color: #00e5ff; text-transform: uppercase; margin-bottom: 5px; }
  .now-doing-task { font-size: 14px; font-weight: 600; }

  /* CATEGORIES CONTAINER — drag target */
  #categories { max-width: 480px; margin: 0 auto; }

  /* CATEGORY BLOCK */
  .cat-block { margin-bottom: 20px; border-radius: 16px; border: 1px solid var(--border); overflow: hidden; background: var(--surface); transition: box-shadow .2s; }
  .cat-block.dragging-cat { opacity: .5; box-shadow: 0 8px 32px rgba(0,0,0,.6); }
  .cat-block.drag-over-cat { box-shadow: 0 0 0 2px #00e5ff; }

  .cat-header { padding: 14px 16px; display: flex; align-items: center; gap: 10px; user-select: none; }
  .cat-drag-handle { color: var(--muted); font-size: 15px; cursor: grab; flex-shrink: 0; padding: 2px 4px; touch-action: none; }
  .cat-drag-handle:active { cursor: grabbing; }
  .cat-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .cat-title-wrap { flex: 1; display: flex; align-items: center; gap: 8px; cursor: pointer; }
  .cat-title { font-size: 15px; font-weight: 700; letter-spacing: .3px; }
  .cat-count { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); }
  .cat-toggle { font-size: 16px; color: var(--muted); transition: transform .25s; flex-shrink: 0; }
  .cat-block.collapsed .cat-toggle { transform: rotate(-90deg); }
  .cat-block.collapsed .task-list,
  .cat-block.collapsed .add-task-row,
  .cat-block.collapsed .section-divider { display: none; }

  .cat-delete-btn { background: none; border: none; color: #ff5555; font-size: 13px; cursor: pointer; padding: 3px 6px; border-radius: 6px; opacity: 0; flex-shrink: 0; transition: opacity .15s; }
  .cat-header:hover .cat-delete-btn { opacity: 1; }
  @media (hover:none) { .cat-delete-btn { opacity: .35; } }

  /* TASK LIST */
  .task-list { background: var(--surface); min-height: 4px; }

  /* TASK ITEM */
  .task-item { display: flex; align-items: flex-start; gap: 10px; padding: 12px 16px; border-top: 1px solid var(--border); transition: background .15s; position: relative; }
  .task-item.done { background: var(--done-bg); }
  .task-item.done .task-text { color: var(--done-text); text-decoration: line-through; text-decoration-color: var(--done-text); }
  .task-item.dragging-task { opacity: .4; }
  .task-item.drag-over-task { border-top: 2px solid #00e5ff; }

  .task-drag-handle { color: var(--muted); font-size: 13px; cursor: grab; flex-shrink: 0; padding: 2px 2px; margin-top: 2px; touch-action: none; }
  .task-drag-handle:active { cursor: grabbing; }

  .checkbox { width: 20px; height: 20px; border-radius: 5px; border: 2px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all .2s; margin-top: 2px; cursor: pointer; }
  .task-item.done .checkbox { background: #69ff47; border-color: #69ff47; }
  .checkmark { display: none; font-size: 12px; color: #000; font-weight: 700; }
  .task-item.done .checkmark { display: block; }

  .task-text { font-size: 14px; font-weight: 500; line-height: 1.4; flex: 1; cursor: pointer; }
  .task-tag { font-family: 'Space Mono', monospace; font-size: 9px; padding: 2px 7px; border-radius: 99px; background: rgba(255,255,255,.05); color: var(--muted); flex-shrink: 0; align-self: center; }
  .task-delete-btn { background: none; border: none; color: #ff5555; font-size: 13px; cursor: pointer; padding: 2px 5px; border-radius: 5px; opacity: 0; flex-shrink: 0; align-self: center; transition: opacity .15s; }
  .task-item:hover .task-delete-btn { opacity: 1; }
  @media (hover:none) { .task-delete-btn { opacity: .35; } }

  /* ADD TASK ROW */
  .add-task-row { background: var(--surface); border-top: 1px solid var(--border); padding: 9px 14px; display: flex; gap: 8px; align-items: center; }
  .add-task-input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Syne', sans-serif; font-size: 14px; padding: 8px 11px; outline: none; transition: border-color .2s; }
  .add-task-input:focus { border-color: var(--muted); }
  .add-task-input::placeholder { color: var(--muted); }
  .add-task-btn { background: rgba(255,255,255,.07); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 20px; width: 36px; height: 36px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .add-task-btn:active { background: rgba(255,255,255,.15); }

  /* EMPTY MSG */
  .empty-msg { text-align: center; color: var(--muted); font-size: 11px; font-family: 'Space Mono', monospace; padding: 16px 20px; border-top: 1px solid var(--border); }

  /* ADD CATEGORY BUTTON */
  .add-cat-wrap { max-width: 480px; margin: 0 auto 20px; }
  .add-cat-btn { width: 100%; background: none; border: 1px dashed var(--border); border-radius: 14px; color: var(--muted); font-family: 'Space Mono', monospace; font-size: 12px; letter-spacing: 2px; padding: 14px; cursor: pointer; transition: border-color .2s, color .2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .add-cat-btn:hover, .add-cat-btn:active { border-color: #bf7fff; color: #bf7fff; }

  /* ADD CATEGORY MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: #1a1a1e; border: 1px solid var(--border); border-radius: 20px 20px 0 0; padding: 24px 20px 40px; width: 100%; max-width: 480px; }
  .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
  .modal-field { margin-bottom: 14px; }
  .modal-label { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
  .modal-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 9px; color: var(--text); font-family: 'Syne', sans-serif; font-size: 15px; padding: 11px 14px; outline: none; }
  .modal-input:focus { border-color: var(--muted); }
  .color-grid { display: flex; gap: 10px; flex-wrap: wrap; }
  .color-swatch { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: border-color .15s, transform .15s; }
  .color-swatch.selected { border-color: #fff; transform: scale(1.15); }
  .modal-btns { display: flex; gap: 10px; margin-top: 18px; }
  .modal-cancel { flex: 1; background: none; border: 1px solid var(--border); border-radius: 9px; color: var(--muted); font-family: 'Space Mono', monospace; font-size: 12px; padding: 12px; cursor: pointer; }
  .modal-confirm { flex: 2; border: none; border-radius: 9px; color: #000; font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; padding: 12px; cursor: pointer; background: #bf7fff; }

  /* CELEBRATION */
  .celebration { display: none; text-align: center; padding: 40px 20px; max-width: 480px; margin: 0 auto; }
  .celebration.show { display: block; }
  .celebration-emoji { font-size: 56px; margin-bottom: 14px; }
  .celebration h2 { font-size: 22px; font-weight: 800; color: #69ff47; }

  /* RESET */
  .reset-btn { display: block; margin: 16px auto 0; background: none; border: 1px solid var(--border); color: var(--muted); font-family: 'Space Mono', monospace; font-size: 10px; padding: 10px 20px; border-radius: 99px; cursor: pointer; letter-spacing: 2px; max-width: 480px; width: 100%; }
</style>
</head>
<body>

<div class="header">
  <div class="header-label">JEE 2028 Prep</div>
  <h1>11th Syllabus<br><span>Catch-up Checklist</span></h1>
</div>

<div class="progress-wrap">
  <div class="progress-top">
    <div class="progress-label">TASKS COMPLETED</div>
    <div class="progress-count" id="progressCount">0 / 0</div>
  </div>
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressBar"></div></div>
</div>

<div class="now-doing" id="nowDoing">
  <div class="now-doing-label">🎯 Start Here</div>
  <div class="now-doing-task" id="nowDoingTask">Differentiation — Mathematical Tools</div>
</div>

<div id="categories"></div>

<div class="add-cat-wrap">
  <button class="add-cat-btn" onclick="openModal()">＋ ADD CATEGORY</button>
</div>

<div class="celebration" id="celebration">
  <div class="celebration-emoji">🔥</div>
  <h2>11th Syllabus Done!</h2>
  <p style="color:var(--muted);margin-top:10px;font-size:13px;">Drop year starts now. JEE 2028, let's go.</p>
</div>

<button class="reset-btn" onclick="resetAll()">RESET ALL PROGRESS</button>

<!-- ADD CATEGORY MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="e => { if(e.target===this) closeModal(); }">
  <div class="modal" onclick="event.stopPropagation()">
    <h3>New Category</h3>
    <div class="modal-field">
      <div class="modal-label">Name</div>
      <input class="modal-input" id="modalName" placeholder="e.g. Biology, Doubts, Boards..." maxlength="30">
    </div>
    <div class="modal-field">
      <div class="modal-label">Colour</div>
      <div class="color-grid" id="colorGrid"></div>
    </div>
    <div class="modal-field">
      <div class="modal-label">Icon (emoji)</div>
      <input class="modal-input" id="modalEmoji" placeholder="📚" maxlength="4" style="font-size:22px;text-align:center;">
    </div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">CANCEL</button>
      <button class="modal-confirm" id="modalConfirm" onclick="addCategory()">ADD</button>
    </div>
  </div>
</div>

<script>
// ─── CONSTANTS ────────────────────────────────────────────────────
const SK = 'jee28_state';
const DK = 'jee28_data';
const PRIORITY_IDS = ['phy-1','phy-2','phy-3','phy-4'];

const PALETTE = ['#00e5ff','#69ff47','#ff6b35','#bf7fff','#ffd60a','#ff4d6d','#2dd4bf','#fb923c','#a3e635','#e879f9'];

const DEFAULT_CATS = [
  {
    id: 'phy', title: '⚛️ Physics', color: '#00e5ff',
    tasks: [
      { id:'phy-1', text:'Differentiation — basic rules + 10 problems', priority:true },
      { id:'phy-2', text:'Integration — basic rules + 10 problems' },
      { id:'phy-3', text:'Logarithm — properties + 5 problems' },
      { id:'phy-4', text:'Motion in a Straight Line (1D) — concepts + numericals' },
      { id:'phy-5', text:'Motion in a Plane — vectors, projectile motion' },
      { id:'phy-6', text:'Laws of Motion — Newton\'s 3 laws, friction' },
      { id:'phy-7', text:'Work, Energy & Power — KE, PE, conservation' },
      { id:'phy-8', text:'System of Particles & Rotational Motion — MI, torque' },
      { id:'phy-9', text:'Gravitation — Kepler\'s laws, escape velocity' },
      { id:'phy-10', text:'Mechanical Properties of Solids — stress, strain, elasticity' },
      { id:'phy-11', text:'Mechanical Properties of Fluids — Bernoulli, viscosity' },
      { id:'phy-12', text:'Thermal Properties of Matter — expansion, specific heat' },
      { id:'phy-13', text:'Thermodynamics — laws, heat engines' },
      { id:'phy-14', text:'Kinetic Theory of Gases — KTG, gas laws' },
      { id:'phy-15', text:'Oscillations — SHM, time period, energy' },
      { id:'phy-16', text:'Waves — sound, superposition, standing waves' }
    ]
  },
  {
    id: 'chem', title: '🧪 Chemistry', color: '#69ff47',
    tasks: [
      { id:'chem-1', text:'Basic Concepts of Chemistry — mole concept, stoichiometry' },
      { id:'chem-2', text:'Structure of Atom — Bohr model, quantum numbers' },
      { id:'chem-3', text:'Thermodynamics — enthalpy, entropy, Hess\'s law' },
      { id:'chem-4', text:'Equilibrium — Kp, Kc, Le Chatelier\'s principle' },
      { id:'chem-5', text:'Redox Reactions — oxidation states, balancing equations' },
      { id:'chem-6', text:'Classification of Elements & Periodicity — periodic trends' },
      { id:'chem-7', text:'Chemical Bonding & Molecular Structure — VSEPR, hybridisation' },
      { id:'chem-8', text:'Basic Principles of Organic Chemistry — IUPAC, isomerism' },
      { id:'chem-9', text:'Hydrocarbons — alkanes, alkenes, alkynes, benzene' }
    ]
  },
  {
    id: 'math', title: '📐 Maths', color: '#ff6b35',
    tasks: [
      { id:'math-1', text:'Sets — operations, Venn diagrams' },
      { id:'math-2', text:'Relations & Functions — types, domain, range' },
      { id:'math-3', text:'Complex Numbers — algebra, Argand plane, modulus' },
      { id:'math-4', text:'Quadratic Equations — roots, nature of roots, sum/product' },
      { id:'math-5', text:'Permutations & Combinations — nPr, nCr, applications' },
      { id:'math-6', text:'Binomial Theorem — expansion, general term, middle term' },
      { id:'math-7', text:'Sequences & Series — AP, GP, special sums' },
      { id:'math-8', text:'Trigonometric Functions — ratios, identities, graphs' },
      { id:'math-9', text:'Straight Lines — slope, equations, angle between lines' },
      { id:'math-10', text:'Conic Sections — circle, parabola, ellipse, hyperbola' },
      { id:'math-11', text:'Limits & Derivatives — basic differentiation rules' },
      { id:'math-12', text:'Statistics — mean, variance, standard deviation' },
      { id:'math-13', text:'Probability — basic probability, conditional probability' }
    ]
  },
  {
    id: 'gen', title: '📌 General', color: '#bf7fff',
    tasks: []
  }
];

// ─── STATE ────────────────────────────────────────────────────────
let state = {}; // { taskId: true/false }
let cats  = []; // array of category objects (with tasks arrays)

function loadAll() {
  try { state = JSON.parse(localStorage.getItem(SK)) || {}; } catch { state = {}; }
  try {
    const saved = JSON.parse(localStorage.getItem(DK));
    cats = saved || JSON.parse(JSON.stringify(DEFAULT_CATS));
  } catch { cats = JSON.parse(JSON.stringify(DEFAULT_CATS)); }
}

function saveAll() {
  localStorage.setItem(SK, JSON.stringify(state));
  localStorage.setItem(DK, JSON.stringify(cats));
}

// ─── RENDER ───────────────────────────────────────────────────────
function render() {
  const container = document.getElementById('categories');
  container.innerHTML = '';
  cats.forEach(cat => container.appendChild(buildCatEl(cat)));
  updateProgress();
  updateNowDoing();
}

function buildCatEl(cat) {
  const block = document.createElement('div');
  block.className = 'cat-block';
  block.dataset.catId = cat.id;

  // Header
  const header = document.createElement('div');
  header.className = 'cat-header';
  header.style.background = hexToRgba(cat.color, 0.06);
  header.innerHTML = `
    <span class="cat-drag-handle" title="Drag to reorder">⠿</span>
    <span class="cat-dot" style="background:${cat.color}"></span>
    <div class="cat-title-wrap" onclick="toggleCat('${cat.id}')">
      <span class="cat-title" style="color:${cat.color}">${cat.title}</span>
      <span class="cat-count" id="ccount-${cat.id}"></span>
    </div>
    <button class="cat-delete-btn" onclick="deleteCat('${cat.id}')" title="Delete category">✕</button>
    <span class="cat-toggle" onclick="toggleCat('${cat.id}')">▾</span>
  `;
  block.appendChild(header);

  // Task list
  const list = document.createElement('div');
  list.className = 'task-list';
  list.id = 'list-' + cat.id;

  if (cat.tasks.length === 0) {
    list.innerHTML = `<div class="empty-msg" id="empty-${cat.id}">No tasks yet — add one below ↓</div>`;
  } else {
    cat.tasks.forEach(task => list.appendChild(buildTaskEl(cat.id, task)));
  }
  block.appendChild(list);

  // Add task row
  const addRow = document.createElement('div');
  addRow.className = 'add-task-row';
  addRow.innerHTML = `
    <input class="add-task-input" id="input-${cat.id}" placeholder="Add a task..." onkeydown="if(event.key==='Enter')addTask('${cat.id}')">
    <button class="add-task-btn" style="color:${cat.color};border-color:${hexToRgba(cat.color,0.3)}" onclick="addTask('${cat.id}')">+</button>
  `;
  block.appendChild(addRow);

  // Make cat draggable
  makeCatDraggable(block, header.querySelector('.cat-drag-handle'));
  // Make tasks draggable
  makeTaskListSortable(list, cat.id);

  return block;
}

function buildTaskEl(catId, task) {
  const el = document.createElement('div');
  el.className = 'task-item' + (state[task.id] ? ' done' : '') + (task.priority ? ' priority' : '');
  if (task.priority) el.style.borderLeft = `3px solid ${getCatColor(catId)}`;
  el.dataset.taskId = task.id;
  el.innerHTML = `
    <span class="task-drag-handle" title="Drag to reorder">⠿</span>
    <div class="checkbox" onclick="toggleTask('${task.id}')"><span class="checkmark">✓</span></div>
    <div class="task-text" onclick="toggleTask('${task.id}')">${task.text}</div>
    ${task.priority ? '<div class="task-tag">NOW</div>' : ''}
    <button class="task-delete-btn" onclick="deleteTask('${catId}','${task.id}')">✕</button>
  `;
  return el;
}

// ─── TASK OPERATIONS ──────────────────────────────────────────────
function toggleTask(taskId) {
  state[taskId] = !state[taskId];
  // update DOM
  const el = document.querySelector(`[data-task-id="${taskId}"]`);
  if (el) el.classList.toggle('done', state[taskId]);
  saveAll();
  updateProgress();
  updateNowDoing();
}

function deleteTask(catId, taskId) {
  const cat = cats.find(c => c.id === catId);
  if (!cat) return;
  cat.tasks = cat.tasks.filter(t => t.id !== taskId);
  delete state[taskId];
  saveAll();
  render();
}

function addTask(catId) {
  const input = document.getElementById('input-' + catId);
  const text = input.value.trim();
  if (!text) return;
  const cat = cats.find(c => c.id === catId);
  if (!cat) return;
  const id = catId + '-c' + Date.now();
  cat.tasks.push({ id, text });
  saveAll();
  render();
  // Re-focus input after render
  setTimeout(() => {
    const inp = document.getElementById('input-' + catId);
    if (inp) inp.focus();
  }, 50);
}

// ─── CATEGORY OPERATIONS ──────────────────────────────────────────
function toggleCat(catId) {
  const block = document.querySelector(`[data-cat-id="${catId}"]`);
  if (block) block.classList.toggle('collapsed');
}

function deleteCat(catId) {
  if (!confirm('Delete this category and all its tasks?')) return;
  // Remove state keys
  const cat = cats.find(c => c.id === catId);
  if (cat) cat.tasks.forEach(t => delete state[t.id]);
  cats = cats.filter(c => c.id !== catId);
  saveAll();
  render();
}

// ─── MODAL ────────────────────────────────────────────────────────
let selectedColor = PALETTE[4];

function buildColorGrid() {
  const grid = document.getElementById('colorGrid');
  grid.innerHTML = '';
  PALETTE.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch' + (c === selectedColor ? ' selected' : '');
    sw.style.background = c;
    sw.onclick = () => {
      selectedColor = c;
      grid.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
      sw.classList.add('selected');
      document.getElementById('modalConfirm').style.background = c;
    };
    grid.appendChild(sw);
  });
}

function openModal() {
  selectedColor = PALETTE[Math.floor(Math.random() * PALETTE.length)];
  document.getElementById('modalName').value = '';
  document.getElementById('modalEmoji').value = '';
  document.getElementById('modalConfirm').style.background = selectedColor;
  buildColorGrid();
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('modalName').focus(), 100);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function addCategory() {
  const name  = document.getElementById('modalName').value.trim();
  const emoji = document.getElementById('modalEmoji').value.trim();
  if (!name) { document.getElementById('modalName').focus(); return; }
  const id = 'cat-' + Date.now();
  const title = (emoji ? emoji + ' ' : '📁 ') + name;
  cats.push({ id, title, color: selectedColor, tasks: [] });
  saveAll();
  closeModal();
  render();
  // Scroll to new category
  setTimeout(() => {
    const el = document.querySelector(`[data-cat-id="${id}"]`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 100);
}

// ─── PROGRESS ─────────────────────────────────────────────────────
function updateProgress() {
  const allTasks = cats.flatMap(c => c.tasks);
  const total = allTasks.length;
  const done  = allTasks.filter(t => state[t.id]).length;

  document.getElementById('progressCount').textContent = done + ' / ' + total;
  document.getElementById('progressBar').style.width = total ? (done/total*100)+'%' : '0%';

  cats.forEach(cat => {
    const el = document.getElementById('ccount-' + cat.id);
    if (!el) return;
    const d = cat.tasks.filter(t => state[t.id]).length;
    el.textContent = cat.tasks.length ? d + '/' + cat.tasks.length : '';
  });

  document.getElementById('celebration').classList.toggle('show', total > 0 && done === total);
}

function updateNowDoing() {
  const nd = document.getElementById('nowDoing');
  // Priority tasks first
  for (const pid of PRIORITY_IDS) {
    if (!state[pid]) {
      for (const cat of cats) {
        const t = cat.tasks.find(t => t.id === pid);
        if (t) {
          document.getElementById('nowDoingTask').textContent = t.text;
          nd.style.display = 'block'; return;
        }
      }
    }
  }
  // Next undone
  for (const cat of cats) {
    for (const t of cat.tasks) {
      if (!state[t.id]) {
        document.getElementById('nowDoingTask').textContent = t.text;
        nd.style.display = 'block'; return;
      }
    }
  }
  nd.style.display = 'none';
}

// ─── DRAG & DROP — CATEGORIES ─────────────────────────────────────
let draggedCat = null;

function makeCatDraggable(block, handle) {
  // Desktop
  handle.addEventListener('mousedown', e => {
    e.preventDefault();
    startCatDrag(block);
  });

  // Touch
  handle.addEventListener('touchstart', e => {
    e.preventDefault();
    startCatDragTouch(block, e);
  }, { passive: false });
}

function startCatDrag(block) {
  draggedCat = block;
  block.classList.add('dragging-cat');

  const onMove = e => {
    e.preventDefault();
    const y = e.clientY;
    const target = getCatAtY(y, block);
    highlightCatTarget(target);
  };

  const onUp = e => {
    if (draggedCat && document.querySelector('.drag-over-cat')) {
      const targetBlock = document.querySelector('.drag-over-cat');
      const fromId = draggedCat.dataset.catId;
      const toId   = targetBlock.dataset.catId;
      reorderCat(fromId, toId);
    }
    endCatDrag();
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  };

  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

function startCatDragTouch(block, e) {
  draggedCat = block;
  block.classList.add('dragging-cat');
  let lastTarget = null;

  const onMove = ev => {
    ev.preventDefault();
    const touch = ev.touches[0];
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    const catBlock = el?.closest('.cat-block');
    if (catBlock && catBlock !== draggedCat) {
      if (lastTarget !== catBlock) {
        document.querySelectorAll('.drag-over-cat').forEach(e => e.classList.remove('drag-over-cat'));
        catBlock.classList.add('drag-over-cat');
        lastTarget = catBlock;
      }
    }
  };

  const onEnd = () => {
    const over = document.querySelector('.drag-over-cat');
    if (over && draggedCat) reorderCat(draggedCat.dataset.catId, over.dataset.catId);
    endCatDrag();
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend', onEnd);
  };

  document.addEventListener('touchmove', onMove, { passive: false });
  document.addEventListener('touchend', onEnd);
}

function getCatAtY(y, exclude) {
  const blocks = [...document.querySelectorAll('.cat-block')].filter(b => b !== exclude);
  return blocks.find(b => {
    const r = b.getBoundingClientRect();
    return y >= r.top && y <= r.bottom;
  });
}

function highlightCatTarget(target) {
  document.querySelectorAll('.drag-over-cat').forEach(e => e.classList.remove('drag-over-cat'));
  if (target) target.classList.add('drag-over-cat');
}

function endCatDrag() {
  if (draggedCat) draggedCat.classList.remove('dragging-cat');
  document.querySelectorAll('.drag-over-cat').forEach(e => e.classList.remove('drag-over-cat'));
  draggedCat = null;
}

function reorderCat(fromId, toId) {
  const fromIdx = cats.findIndex(c => c.id === fromId);
  const toIdx   = cats.findIndex(c => c.id === toId);
  if (fromIdx === -1 || toIdx === -1) return;
  const [moved] = cats.splice(fromIdx, 1);
  cats.splice(toIdx, 0, moved);
  saveAll();
  render();
}

// ─── DRAG & DROP — TASKS ──────────────────────────────────────────
let draggedTask = null;
let draggedTaskCatId = null;

function makeTaskListSortable(list, catId) {
  list.querySelectorAll('.task-item').forEach(item => {
    const handle = item.querySelector('.task-drag-handle');

    handle.addEventListener('mousedown', e => {
      e.preventDefault();
      startTaskDrag(item, catId);
    });

    handle.addEventListener('touchstart', e => {
      e.preventDefault();
      startTaskDragTouch(item, catId, e);
    }, { passive: false });
  });
}

function startTaskDrag(item, catId) {
  draggedTask = item;
  draggedTaskCatId = catId;
  item.classList.add('dragging-task');

  const onMove = e => {
    e.preventDefault();
    const target = getTaskAtY(e.clientY, item);
    highlightTaskTarget(target);
  };

  const onUp = () => {
    const over = document.querySelector('.drag-over-task');
    if (over && draggedTask && over !== draggedTask) {
      reorderTask(draggedTaskCatId, draggedTask.dataset.taskId, over.dataset.taskId);
    }
    endTaskDrag();
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  };

  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

function startTaskDragTouch(item, catId, e) {
  draggedTask = item;
  draggedTaskCatId = catId;
  item.classList.add('dragging-task');
  let lastOver = null;

  const onMove = ev => {
    ev.preventDefault();
    const t = ev.touches[0];
    const el = document.elementFromPoint(t.clientX, t.clientY);
    const taskEl = el?.closest('.task-item');
    if (taskEl && taskEl !== draggedTask) {
      if (lastOver !== taskEl) {
        document.querySelectorAll('.drag-over-task').forEach(e => e.classList.remove('drag-over-task'));
        taskEl.classList.add('drag-over-task');
        lastOver = taskEl;
      }
    }
  };

  const onEnd = () => {
    const over = document.querySelector('.drag-over-task');
    if (over && draggedTask && over !== draggedTask) {
      reorderTask(draggedTaskCatId, draggedTask.dataset.taskId, over.dataset.taskId);
    }
    endTaskDrag();
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend', onEnd);
  };

  document.addEventListener('touchmove', onMove, { passive: false });
  document.addEventListener('touchend', onEnd);
}

function getTaskAtY(y, exclude) {
  const items = [...document.querySelectorAll('.task-item')].filter(i => i !== exclude);
  return items.find(i => {
    const r = i.getBoundingClientRect();
    return y >= r.top && y <= r.bottom;
  });
}

function highlightTaskTarget(target) {
  document.querySelectorAll('.drag-over-task').forEach(e => e.classList.remove('drag-over-task'));
  if (target) target.classList.add('drag-over-task');
}

function endTaskDrag() {
  if (draggedTask) draggedTask.classList.remove('dragging-task');
  document.querySelectorAll('.drag-over-task').forEach(e => e.classList.remove('drag-over-task'));
  draggedTask = null;
  draggedTaskCatId = null;
}

function reorderTask(catId, fromTaskId, toTaskId) {
  const cat = cats.find(c => c.id === catId);
  if (!cat) return;
  const fromIdx = cat.tasks.findIndex(t => t.id === fromTaskId);
  const toIdx   = cat.tasks.findIndex(t => t.id === toTaskId);
  if (fromIdx === -1 || toIdx === -1) return;
  const [moved] = cat.tasks.splice(fromIdx, 1);
  cat.tasks.splice(toIdx, 0, moved);
  saveAll();
  render();
}

// ─── HELPERS ──────────────────────────────────────────────────────
function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function getCatColor(catId) {
  return cats.find(c => c.id === catId)?.color || '#fff';
}

function resetAll() {
  if (!confirm('Reset all progress and custom categories/tasks?')) return;
  localStorage.removeItem(SK);
  localStorage.removeItem(DK);
  state = {};
  cats = JSON.parse(JSON.stringify(DEFAULT_CATS));
  saveAll();
  render();
}

// Close modal on overlay click
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ─── INIT ─────────────────────────────────────────────────────────
loadAll();
render();
</script>
