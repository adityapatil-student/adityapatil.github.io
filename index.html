<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>JEE 2028 — Study Checklist</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e10;
    --surface: #17171a;
    --border: #2a2a2f;
    --text: #e8e8ec;
    --muted: #666672;
    --done-bg: #1a2a1a;
    --done-text: #4a7a4a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; padding: 20px 12px 80px; }

  /* HEADER */
  .header { text-align: center; padding: 24px 0 18px; }
  .header-label { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 4px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
  .header h1 { font-size: 22px; font-weight: 800; line-height: 1.2; }
  .header h1 span { color: #00e5ff; }

  /* TWO COLUMN LAYOUT */
  .columns-wrap { display: flex; gap: 12px; align-items: flex-start; max-width: 1100px; margin: 0 auto; }
  .column { flex: 1; min-width: 0; }
  .col-header { text-align: center; padding: 10px 0 14px; }
  .col-label { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; }
  .col-title { font-size: 16px; font-weight: 800; }
  .col-title.t11 { color: #ff6b35; }
  .col-title.t12 { color: #00e5ff; }

  /* PROGRESS */
  .progress-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; margin-bottom: 16px; }
  .progress-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .progress-label { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); }
  .progress-count { font-family: 'Space Mono', monospace; font-size: 16px; font-weight: 700; }
  .progress-count.c11 { color: #ff6b35; }
  .progress-count.c12 { color: #00e5ff; }
  .progress-bar-bg { background: var(--border); border-radius: 99px; height: 5px; overflow: hidden; }
  .progress-bar-fill { height: 100%; border-radius: 99px; transition: width .5s cubic-bezier(.4,0,.2,1); width: 0%; }
  .fill-11 { background: linear-gradient(90deg,#ff6b35,#ffd60a); }
  .fill-12 { background: linear-gradient(90deg,#00e5ff,#69ff47); }

  /* CATEGORY BLOCK */
  .cat-block { margin-bottom: 14px; border-radius: 14px; border: 1px solid var(--border); overflow: hidden; background: var(--surface); }
  .cat-header { padding: 11px 13px; display: flex; align-items: center; gap: 8px; user-select: none; cursor: pointer; }
  .cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .cat-title { font-size: 13px; font-weight: 700; flex: 1; }
  .cat-count { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); }
  .cat-toggle { font-size: 14px; color: var(--muted); transition: transform .22s; }
  .cat-block.collapsed .cat-toggle { transform: rotate(-90deg); }
  .cat-block.collapsed .task-list,
  .cat-block.collapsed .add-task-row { display: none; }

  /* TASK LIST */
  .task-list { background: var(--surface); }
  .task-item { display: flex; align-items: flex-start; gap: 9px; padding: 10px 13px; border-top: 1px solid var(--border); transition: background .15s; }
  .task-item.done { background: var(--done-bg); }
  .task-item.done .task-text { color: var(--done-text); text-decoration: line-through; text-decoration-color: var(--done-text); }
  .checkbox { width: 18px; height: 18px; border-radius: 4px; border: 2px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all .18s; margin-top: 2px; cursor: pointer; }
  .task-item.done .checkbox { background: #69ff47; border-color: #69ff47; }
  .checkmark { display: none; font-size: 10px; color: #000; font-weight: 700; }
  .task-item.done .checkmark { display: block; }
  .task-text { font-size: 12px; font-weight: 500; line-height: 1.4; flex: 1; cursor: pointer; }
  .task-delete-btn { background: none; border: none; color: #ff5555; font-size: 11px; cursor: pointer; padding: 2px 4px; border-radius: 4px; opacity: 0; flex-shrink: 0; align-self: center; transition: opacity .15s; }
  .task-item:hover .task-delete-btn { opacity: 1; }
  @media (hover:none) { .task-delete-btn { opacity: .3; } }

  /* ADD TASK ROW */
  .add-task-row { background: var(--surface); border-top: 1px solid var(--border); padding: 7px 10px; display: flex; gap: 6px; align-items: center; }
  .add-task-input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 7px; color: var(--text); font-family: 'Syne', sans-serif; font-size: 12px; padding: 6px 9px; outline: none; transition: border-color .2s; }
  .add-task-input:focus { border-color: var(--muted); }
  .add-task-input::placeholder { color: var(--muted); }
  .add-task-btn { background: rgba(255,255,255,.07); border: 1px solid var(--border); border-radius: 7px; color: var(--text); font-size: 18px; width: 30px; height: 30px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

  /* EMPTY MSG */
  .empty-msg { text-align: center; color: var(--muted); font-size: 10px; font-family: 'Space Mono', monospace; padding: 12px; border-top: 1px solid var(--border); }

  /* ADD CATEGORY BUTTON */
  .add-cat-btn { width: 100%; background: none; border: 1px dashed var(--border); border-radius: 12px; color: var(--muted); font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 2px; padding: 11px; cursor: pointer; transition: border-color .2s, color .2s; display: flex; align-items: center; justify-content: center; gap: 6px; margin-bottom: 14px; }
  .add-cat-btn:hover { border-color: #bf7fff; color: #bf7fff; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 200; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: #1a1a1e; border: 1px solid var(--border); border-radius: 20px 20px 0 0; padding: 22px 18px 38px; width: 100%; max-width: 440px; }
  .modal h3 { font-size: 15px; font-weight: 700; margin-bottom: 14px; }
  .modal-field { margin-bottom: 12px; }
  .modal-label { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 5px; }
  .modal-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Syne', sans-serif; font-size: 14px; padding: 10px 12px; outline: none; }
  .modal-input:focus { border-color: var(--muted); }
  .color-grid { display: flex; gap: 8px; flex-wrap: wrap; }
  .color-swatch { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: border-color .15s, transform .15s; }
  .color-swatch.selected { border-color: #fff; transform: scale(1.15); }
  .modal-btns { display: flex; gap: 8px; margin-top: 16px; }
  .modal-cancel { flex: 1; background: none; border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-family: 'Space Mono', monospace; font-size: 11px; padding: 11px; cursor: pointer; }
  .modal-confirm { flex: 2; border: none; border-radius: 8px; color: #000; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; padding: 11px; cursor: pointer; background: #bf7fff; }

  /* RESET */
  .footer-row { display: flex; gap: 10px; max-width: 1100px; margin: 8px auto 0; }
  .reset-btn { flex: 1; background: none; border: 1px solid var(--border); color: var(--muted); font-family: 'Space Mono', monospace; font-size: 9px; padding: 9px; border-radius: 99px; cursor: pointer; letter-spacing: 2px; }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    .columns-wrap { flex-direction: column; }
    .col-header { padding: 6px 0 10px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-label">JEE 2028 Prep</div>
  <h1>Full Syllabus<br><span>Catch-up Checklist</span></h1>
</div>

<div class="columns-wrap">
  <!-- ══════════ LEFT — CLASS 11 ══════════ -->
  <div class="column" id="col-11">
    <div class="col-header">
      <div class="col-label">Class</div>
      <div class="col-title t11">11th ←</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-top">
        <div class="progress-label">COMPLETED</div>
        <div class="progress-count c11" id="prog11Count">0 / 0</div>
      </div>
      <div class="progress-bar-bg"><div class="progress-bar-fill fill-11" id="prog11Bar"></div></div>
    </div>
    <div id="cats11"></div>
    <button class="add-cat-btn" onclick="openModal(11)">＋ ADD CATEGORY</button>
  </div>

  <!-- ══════════ RIGHT — CLASS 12 ══════════ -->
  <div class="column" id="col-12">
    <div class="col-header">
      <div class="col-label">Class</div>
      <div class="col-title t12">→ 12th</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-top">
        <div class="progress-label">COMPLETED</div>
        <div class="progress-count c12" id="prog12Count">0 / 0</div>
      </div>
      <div class="progress-bar-bg"><div class="progress-bar-fill fill-12" id="prog12Bar"></div></div>
    </div>
    <div id="cats12"></div>
    <button class="add-cat-btn" onclick="openModal(12)">＋ ADD CATEGORY</button>
  </div>
</div>

<div class="footer-row">
  <button class="reset-btn" onclick="resetAll(11)">RESET 11TH PROGRESS</button>
  <button class="reset-btn" onclick="resetAll(12)">RESET 12TH PROGRESS</button>
</div>

<!-- ADD CATEGORY MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" onclick="event.stopPropagation()">
    <h3 id="modalTitle">New Category</h3>
    <div class="modal-field">
      <div class="modal-label">Name</div>
      <input class="modal-input" id="modalName" placeholder="e.g. Biology, Doubts..." maxlength="30">
    </div>
    <div class="modal-field">
      <div class="modal-label">Colour</div>
      <div class="color-grid" id="colorGrid"></div>
    </div>
    <div class="modal-field">
      <div class="modal-label">Icon (emoji)</div>
      <input class="modal-input" id="modalEmoji" placeholder="📚" maxlength="4" style="font-size:20px;text-align:center;">
    </div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">CANCEL</button>
      <button class="modal-confirm" id="modalConfirm" onclick="addCategory()">ADD</button>
    </div>
  </div>
</div>

// ─── STATE ────────────────────────────────────────────────────────
let state11 = {}, state12 = {};
let cats11 = [], cats12 = [];
let collapse11 = {}, collapse12 = {}; // { catId: true } means collapsed

function loadAll() {
  try { state11 = JSON.parse(localStorage.getItem(SK11)) || {}; } catch { state11 = {}; }
  try { state12 = JSON.parse(localStorage.getItem(SK12)) || {}; } catch { state12 = {}; }
  try { cats11 = JSON.parse(localStorage.getItem(DK11)) || JSON.parse(JSON.stringify(DEFAULT_CATS_11)); } catch { cats11 = JSON.parse(JSON.stringify(DEFAULT_CATS_11)); }
  try { cats12 = JSON.parse(localStorage.getItem(DK12)) || JSON.parse(JSON.stringify(DEFAULT_CATS_12)); } catch { cats12 = JSON.parse(JSON.stringify(DEFAULT_CATS_12)); }
  try { collapse11 = JSON.parse(localStorage.getItem(CK11)) || {}; } catch { collapse11 = {}; }
  try { collapse12 = JSON.parse(localStorage.getItem(CK12)) || {}; } catch { collapse12 = {}; }
}

function saveAll() {
  localStorage.setItem(SK11, JSON.stringify(state11));
  localStorage.setItem(SK12, JSON.stringify(state12));
  localStorage.setItem(DK11, JSON.stringify(cats11));
  localStorage.setItem(DK12, JSON.stringify(cats12));
  localStorage.setItem(CK11, JSON.stringify(collapse11));
  localStorage.setItem(CK12, JSON.stringify(collapse12));
}

// ─── RENDER ───────────────────────────────────────────────────────
function render() {
  renderColumn(11);
  renderColumn(12);
}

function renderColumn(cls) {
  const cats = cls === 11 ? cats11 : cats12;
  const container = document.getElementById('cats' + cls);
  container.innerHTML = '';
  cats.forEach(cat => container.appendChild(buildCatEl(cat, cls)));
  updateProgress(cls);
}

function buildCatEl(cat, cls) {
  const state = cls === 11 ? state11 : state12;
  const collapse = cls === 11 ? collapse11 : collapse12;

  const block = document.createElement('div');
  block.className = 'cat-block' + (collapse[cat.id] ? ' collapsed' : '');
  block.dataset.catId = cat.id;
  block.dataset.cls = cls;

  const header = document.createElement('div');
  header.className = 'cat-header';
  header.style.background = hexToRgba(cat.color, 0.06);
  header.innerHTML = `
    <span class="cat-dot" style="background:${cat.color}"></span>
    <span class="cat-title" style="color:${cat.color}">${cat.title}</span>
    <span class="cat-count" id="ccount-${cls}-${cat.id}"></span>
    <span class="cat-toggle">▾</span>
  `;
  header.addEventListener('click', () => toggleCat(cat.id, cls));
  block.appendChild(header);

  // Task list
  const list = document.createElement('div');
  list.className = 'task-list';
  list.id = 'list-' + cls + '-' + cat.id;

  if (cat.tasks.length === 0) {
    list.innerHTML = `<div class="empty-msg">No tasks yet — add one below ↓</div>`;
  } else {
    cat.tasks.forEach(task => list.appendChild(buildTaskEl(task, cat.id, cls)));
  }
  block.appendChild(list);

  // Add task row
  const addRow = document.createElement('div');
  addRow.className = 'add-task-row';
  addRow.innerHTML = `
    <input class="add-task-input" id="input-${cls}-${cat.id}" placeholder="Add task..." onkeydown="if(event.key==='Enter')addTask('${cat.id}',${cls})">
    <button class="add-task-btn" style="color:${cat.color};border-color:${hexToRgba(cat.color,0.3)}" onclick="addTask('${cat.id}',${cls})">+</button>
  `;
  block.appendChild(addRow);

  // Update count
  setTimeout(() => updateCatCount(cat.id, cls), 0);

  return block;
}

function buildTaskEl(task, catId, cls) {
  const state = cls === 11 ? state11 : state12;
  const el = document.createElement('div');
  el.className = 'task-item' + (state[task.id] ? ' done' : '');
  el.dataset.taskId = task.id;
  el.innerHTML = `
    <div class="checkbox" onclick="toggleTask('${task.id}',${cls})"><span class="checkmark">✓</span></div>
    <div class="task-text" onclick="toggleTask('${task.id}',${cls})">${task.text}</div>
    <button class="task-delete-btn" onclick="deleteTask('${catId}','${task.id}',${cls})">✕</button>
  `;
  return el;
}

// ─── TASK OPERATIONS ──────────────────────────────────────────────
function toggleTask(taskId, cls) {
  const state = cls === 11 ? state11 : state12;
  state[taskId] = !state[taskId];
  const el = document.querySelector(`[data-task-id="${taskId}"]`);
  if (el) el.classList.toggle('done', state[taskId]);
  saveAll();
  updateProgress(cls);
  // Update count for parent cat
  const cats = cls === 11 ? cats11 : cats12;
  const cat = cats.find(c => c.tasks.some(t => t.id === taskId));
  if (cat) updateCatCount(cat.id, cls);
}

function deleteTask(catId, taskId, cls) {
  const cats = cls === 11 ? cats11 : cats12;
  const state = cls === 11 ? state11 : state12;
  const cat = cats.find(c => c.id === catId);
  if (!cat) return;
  cat.tasks = cat.tasks.filter(t => t.id !== taskId);
  delete state[taskId];
  saveAll();
  renderColumn(cls);
}

function addTask(catId, cls) {
  const input = document.getElementById('input-' + cls + '-' + catId);
  const text = input.value.trim();
  if (!text) return;
  const cats = cls === 11 ? cats11 : cats12;
  const cat = cats.find(c => c.id === catId);
  if (!cat) return;
  const id = catId + '-c' + Date.now();
  cat.tasks.push({ id, text });
  saveAll();
  renderColumn(cls);
  setTimeout(() => {
    const inp = document.getElementById('input-' + cls + '-' + catId);
    if (inp) inp.focus();
  }, 50);
}

// ─── CATEGORY TOGGLE (with persistent state) ──────────────────────
function toggleCat(catId, cls) {
  const collapse = cls === 11 ? collapse11 : collapse12;
  collapse[catId] = !collapse[catId];
  saveAll(); // persist immediately
  const block = document.querySelector(`[data-cat-id="${catId}"][data-cls="${cls}"]`);
  if (block) block.classList.toggle('collapsed', collapse[catId]);
}

// ─── PROGRESS ─────────────────────────────────────────────────────
function updateProgress(cls) {
  const cats = cls === 11 ? cats11 : cats12;
  const state = cls === 11 ? state11 : state12;
  const allTasks = cats.flatMap(c => c.tasks);
  const total = allTasks.length;
  const done  = allTasks.filter(t => state[t.id]).length;

  document.getElementById('prog' + cls + 'Count').textContent = done + ' / ' + total;
  document.getElementById('prog' + cls + 'Bar').style.width = total ? (done/total*100)+'%' : '0%';

  cats.forEach(cat => updateCatCount(cat.id, cls));
}

function updateCatCount(catId, cls) {
  const cats = cls === 11 ? cats11 : cats12;
  const state = cls === 11 ? state11 : state12;
  const el = document.getElementById('ccount-' + cls + '-' + catId);
  if (!el) return;
  const cat = cats.find(c => c.id === catId);
  if (!cat) return;
  const d = cat.tasks.filter(t => state[t.id]).length;
  el.textContent = cat.tasks.length ? d + '/' + cat.tasks.length : '';
}

// ─── MODAL ────────────────────────────────────────────────────────
let selectedColor = PALETTE[4];
let modalTargetCls = 11;

function buildColorGrid() {
  const grid = document.getElementById('colorGrid');
  grid.innerHTML = '';
  PALETTE.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch' + (c === selectedColor ? ' selected' : '');
    sw.style.background = c;
    sw.onclick = () => {
      selectedColor = c;
      grid.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
      sw.classList.add('selected');
      document.getElementById('modalConfirm').style.background = c;
    };
    grid.appendChild(sw);
  });
}

function openModal(cls) {
  modalTargetCls = cls;
  selectedColor = PALETTE[Math.floor(Math.random() * PALETTE.length)];
  document.getElementById('modalName').value = '';
  document.getElementById('modalEmoji').value = '';
  document.getElementById('modalTitle').textContent = 'New Category (Class ' + cls + ')';
  document.getElementById('modalConfirm').style.background = selectedColor;
  buildColorGrid();
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('modalName').focus(), 100);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function addCategory() {
  const name  = document.getElementById('modalName').value.trim();
  const emoji = document.getElementById('modalEmoji').value.trim();
  if (!name) { document.getElementById('modalName').focus(); return; }
  const id = 'cat-' + modalTargetCls + '-' + Date.now();
  const title = (emoji ? emoji + ' ' : '📁 ') + name;
  const cats = modalTargetCls === 11 ? cats11 : cats12;
  cats.push({ id, title, color: selectedColor, tasks: [] });
  saveAll();
  closeModal();
  renderColumn(modalTargetCls);
}

// ─── RESET ────────────────────────────────────────────────────────
function resetAll(cls) {
  if (!confirm('Reset all Class ' + cls + ' progress and custom categories/tasks?')) return;
  if (cls === 11) {
    state11 = {}; cats11 = JSON.parse(JSON.stringify(DEFAULT_CATS_11)); collapse11 = {};
  } else {
    state12 = {}; cats12 = JSON.parse(JSON.stringify(DEFAULT_CATS_12)); collapse12 = {};
  }
  saveAll();
  renderColumn(cls);
}

// ─── HELPER ───────────────────────────────────────────────────────
function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// Close modal on overlay click
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ─── INIT ─────────────────────────────────────────────────────────
loadAll();
render();
</script>
</body>
